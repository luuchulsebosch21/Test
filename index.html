<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Dealflow</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3348;
            --text: #e4e6f0;
            --text-dim: #8a8fa8;
            --accent: #6c7cff;
            --accent-hover: #8590ff;
            --green: #34d399;
            --red: #f87171;
            --orange: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        h1 span { color: var(--accent); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid var(--border);
        }

        .tab {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .tab:hover { color: var(--text); }
        .tab.active { background: var(--accent); color: #fff; }

        /* Period selector */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .period-selector {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border);
        }

        .period-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .period-btn:hover { color: var(--text); }
        .period-btn.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .refresh-btn:hover { background: var(--accent); color: #fff; }
        .refresh-btn.loading .refresh-icon { animation: spin 0.8s linear infinite; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .date-display {
            color: var(--text-dim);
            font-size: 13px;
            margin-left: auto;
        }

        /* News feed */
        .feed { display: flex; flex-direction: column; gap: 12px; }

        .news-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            transition: border-color 0.15s;
        }

        .news-card { cursor: pointer; text-decoration: none; display: block; color: inherit; }
        .news-card:hover { border-color: var(--accent); }

        .news-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .company-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background: var(--surface2);
            border: 1px solid var(--border);
        }

        .company-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .news-type {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .type-funding { background: rgba(52, 211, 153, 0.15); color: var(--green); }
        .type-product { background: rgba(108, 124, 255, 0.15); color: var(--accent); }
        .type-partnership { background: rgba(251, 191, 36, 0.15); color: var(--orange); }
        .type-hiring { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        .type-exit { background: rgba(248, 113, 113, 0.15); color: var(--red); }
        .type-general { background: rgba(138, 143, 168, 0.15); color: var(--text-dim); }

        .news-date {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: auto;
        }

        .news-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .news-summary {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .news-source {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            color: var(--accent);
            text-decoration: none;
        }

        .news-source:hover { text-decoration: underline; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state p { font-size: 14px; margin-top: 8px; }

        /* Portfolio management */
        .portfolio-section { display: none; }
        .portfolio-section.active { display: block; }
        .feed-section { display: none; }
        .feed-section.active { display: block; }

        .add-form {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .add-form input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        .add-form input:focus { border-color: var(--accent); }

        .add-form input::placeholder { color: var(--text-dim); }

        .add-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .add-btn:hover { background: var(--accent-hover); }

        .company-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .company-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
        }

        .company-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .company-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .company-name { font-weight: 500; font-size: 15px; }

        .company-sector {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .remove-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--red);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }

        .remove-btn:hover { background: rgba(248, 113, 113, 0.1); border-color: var(--red); }

        .sector-input {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            outline: none;
            width: 160px;
        }

        .sector-input:focus { border-color: var(--accent); }

        .company-count {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        /* Loading */
        .loading-skeleton {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-line {
            height: 12px;
            background: var(--surface2);
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .skeleton-line:last-child { margin-bottom: 0; width: 60%; }
        .skeleton-line.short { width: 40%; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .controls { flex-direction: column; align-items: stretch; }
            .date-display { margin-left: 0; }
            header { flex-direction: column; align-items: flex-start; }
            .add-form { flex-direction: column; }
            .sector-input { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>&#9679;</span> Portfolio Dealflow</h1>
            <div class="tabs">
                <button class="tab active" data-tab="feed">Nieuwsfeed</button>
                <button class="tab" data-tab="portfolio">Portfolio</button>
            </div>
        </header>

        <!-- Feed Section -->
        <div class="feed-section active" id="feed-section">
            <div class="controls">
                <div class="period-selector">
                    <button class="period-btn active" data-period="day">Dag</button>
                    <button class="period-btn" data-period="week">Week</button>
                    <button class="period-btn" data-period="month">Maand</button>
                </div>
                <button class="refresh-btn" id="refresh-btn">
                    <svg class="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Vernieuwen
                </button>
                <span class="date-display" id="date-display"></span>
            </div>
            <div class="feed" id="news-feed"></div>
        </div>

        <!-- Portfolio Section -->
        <div class="portfolio-section" id="portfolio-section">
            <div class="add-form">
                <input type="text" id="company-input" placeholder="Bedrijfsnaam toevoegen...">
                <input type="text" class="sector-input" id="sector-input" placeholder="Sector (optioneel)">
                <button class="add-btn" id="add-btn">Toevoegen</button>
            </div>
            <div class="company-count" id="company-count"></div>
            <div class="company-list" id="company-list"></div>
        </div>
    </div>

    <script>
        // --- State ---
        const STORAGE_KEY = 'portfolio-dealflow';
        const COLORS = ['#6c7cff','#34d399','#f87171','#fbbf24','#a855f7','#ec4899','#06b6d4','#f97316','#84cc16','#64748b'];
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

        let state = loadState();
        let newsItems = [];
        let isLoading = false;

        function defaultState() {
            return {
                companies: [
                    { name: 'Stripe', sector: 'Fintech', color: COLORS[0] },
                    { name: 'SpaceX', sector: 'Aerospace', color: COLORS[1] },
                    { name: 'Databricks', sector: 'AI/Data', color: COLORS[2] },
                    { name: 'Klarna', sector: 'Fintech', color: COLORS[3] },
                    { name: 'Canva', sector: 'Design', color: COLORS[4] },
                ],
                period: 'day'
            };
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.companies && parsed.companies.length >= 0) return parsed;
                }
            } catch(e) {}
            return defaultState();
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        // --- Google News RSS ---
        function getPeriodParam(period) {
            if (period === 'day') return 'when:1d';
            if (period === 'week') return 'when:7d';
            return 'when:30d';
        }

        async function fetchNewsForCompany(company) {
            const query = encodeURIComponent(company.name);
            const when = getPeriodParam(state.period);
            const rssUrl = `https://news.google.com/rss/search?q=${query}+${when}&hl=nl&gl=NL&ceid=NL:nl`;
            const url = CORS_PROXY + encodeURIComponent(rssUrl);

            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('Fetch failed');
                const text = await resp.text();
                return parseRSS(text, company);
            } catch (e) {
                console.warn(`Nieuws ophalen mislukt voor ${company.name}:`, e);
                return [];
            }
        }

        function parseRSS(xmlText, company) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlText, 'text/xml');
            const items = doc.querySelectorAll('item');
            const results = [];

            items.forEach(item => {
                const title = item.querySelector('title')?.textContent || '';
                const link = item.querySelector('link')?.textContent || '';
                const pubDate = item.querySelector('pubDate')?.textContent || '';
                const source = item.querySelector('source')?.textContent || '';

                // Clean title: Google News appends " - Source" at the end
                const cleanTitle = title.replace(/\s*-\s*[^-]+$/, '');

                results.push({
                    company: company.name,
                    color: company.color,
                    title: cleanTitle,
                    link,
                    source,
                    date: pubDate ? new Date(pubDate) : new Date(),
                    dateStr: pubDate ? formatDateFromDate(new Date(pubDate)) : ''
                });
            });

            return results;
        }

        function filterByPeriod(items, period) {
            const now = new Date();
            let cutoff = new Date(now);
            if (period === 'day') cutoff.setDate(now.getDate() - 1);
            else if (period === 'week') cutoff.setDate(now.getDate() - 7);
            else cutoff.setDate(now.getDate() - 30);

            return items.filter(item => item.date >= cutoff);
        }

        async function fetchAllNews() {
            if (state.companies.length === 0) {
                newsItems = [];
                return;
            }

            const promises = state.companies.map(c => fetchNewsForCompany(c));
            const results = await Promise.all(promises);
            let all = results.flat();

            // Filter by period
            all = filterByPeriod(all, state.period);

            // Sort by date (newest first)
            all.sort((a, b) => b.date - a.date);

            // Limit to max 10 per day equivalent
            const maxItems = state.period === 'day' ? 10 : state.period === 'week' ? 40 : 100;
            newsItems = all.slice(0, maxItems);
        }

        // --- Rendering ---
        function formatDateFromDate(d) {
            return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

        function renderDateDisplay() {
            const el = document.getElementById('date-display');
            const today = new Date();
            const period = state.period;
            const options = { day: 'numeric', month: 'long', year: 'numeric' };

            if (period === 'day') {
                el.textContent = today.toLocaleDateString('nl-NL', options);
            } else if (period === 'week') {
                const weekAgo = new Date(today);
                weekAgo.setDate(today.getDate() - 6);
                el.textContent = weekAgo.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }) +
                    ' - ' + today.toLocaleDateString('nl-NL', options);
            } else {
                const monthAgo = new Date(today);
                monthAgo.setDate(today.getDate() - 29);
                el.textContent = monthAgo.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }) +
                    ' - ' + today.toLocaleDateString('nl-NL', options);
            }
        }

        function showLoading() {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = Array(3).fill(`
                <div class="loading-skeleton">
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderFeed() {
            const feed = document.getElementById('news-feed');

            if (newsItems.length === 0) {
                feed.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p><strong>Geen nieuws gevonden</strong></p>
                        <p>${state.companies.length === 0 ? 'Voeg eerst bedrijven toe aan je portfolio.' : 'Geen relevant dealflow nieuws voor deze periode. Klik op Vernieuwen om opnieuw te zoeken.'}</p>
                    </div>`;
                return;
            }

            feed.innerHTML = newsItems.map(item => `
                <a class="news-card" href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">
                    <div class="news-card-header">
                        <span class="company-badge">
                            <span class="company-dot" style="background:${escapeHtml(item.color)}"></span>
                            ${escapeHtml(item.company)}
                        </span>
                        ${item.source ? `<span class="news-type type-general">${escapeHtml(item.source)}</span>` : ''}
                        <span class="news-date">${escapeHtml(item.dateStr)}</span>
                    </div>
                    <div class="news-title">${escapeHtml(item.title)}</div>
                    <span class="news-source">Lees artikel &#8594;</span>
                </a>
            `).join('');
        }

        function renderCompanyList() {
            const list = document.getElementById('company-list');
            const count = document.getElementById('company-count');
            count.textContent = `${state.companies.length} bedrijven in portfolio`;

            if (state.companies.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <p>Geen bedrijven in je portfolio. Voeg er een toe hierboven.</p>
                    </div>`;
                return;
            }

            list.innerHTML = state.companies.map((c, i) => `
                <div class="company-item">
                    <div class="company-info">
                        <span class="company-color" style="background:${c.color}"></span>
                        <div>
                            <div class="company-name">${escapeHtml(c.name)}</div>
                            ${c.sector ? `<div class="company-sector">${escapeHtml(c.sector)}</div>` : ''}
                        </div>
                    </div>
                    <button class="remove-btn" data-index="${i}">Verwijderen</button>
                </div>
            `).join('');
        }

        // --- Refresh handler ---
        async function refreshNews() {
            if (isLoading) return;
            isLoading = true;
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('loading');
            showLoading();

            await fetchAllNews();

            btn.classList.remove('loading');
            isLoading = false;
            renderFeed();
        }

        // --- Event handlers ---
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                document.getElementById('feed-section').classList.toggle('active', target === 'feed');
                document.getElementById('portfolio-section').classList.toggle('active', target === 'portfolio');
            });
        });

        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.period = btn.dataset.period;
                saveState();
                renderDateDisplay();
                refreshNews();
            });
        });

        document.getElementById('refresh-btn').addEventListener('click', refreshNews);

        document.getElementById('add-btn').addEventListener('click', addCompany);
        document.getElementById('company-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addCompany();
        });

        function addCompany() {
            const nameInput = document.getElementById('company-input');
            const sectorInput = document.getElementById('sector-input');
            const name = nameInput.value.trim();
            if (!name) return;

            const exists = state.companies.some(c => c.name.toLowerCase() === name.toLowerCase());
            if (exists) { nameInput.value = ''; return; }

            state.companies.push({
                name,
                sector: sectorInput.value.trim() || '',
                color: COLORS[state.companies.length % COLORS.length]
            });
            saveState();
            nameInput.value = '';
            sectorInput.value = '';
            renderCompanyList();
        }

        document.getElementById('company-list').addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-btn')) {
                const index = parseInt(e.target.dataset.index);
                state.companies.splice(index, 1);
                saveState();
                renderCompanyList();
            }
        });

        // --- Init ---
        renderDateDisplay();
        renderCompanyList();
        refreshNews();
    </script>
</body>
</html>
