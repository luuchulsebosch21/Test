<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Portfolio Dealflow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3348;
            --text: #e4e6f0;
            --text-dim: #8a8fa8;
            --accent: #6c7cff;
            --accent-hover: #8590ff;
            --green: #34d399;
            --red: #f87171;
            --orange: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
        h1 span { color: var(--accent); }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid var(--border);
        }

        .tab {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .tab:hover { color: var(--text); }
        .tab.active { background: var(--accent); color: #fff; }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .period-selector {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border);
        }

        .period-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .period-btn:hover { color: var(--text); }
        .period-btn.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

        .date-range {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .date-range label {
            font-size: 12px;
            color: var(--text-dim);
        }

        .date-input {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }

        .date-input:focus { border-color: var(--accent); }
        .date-input::-webkit-calendar-picker-indicator { filter: invert(0.7); }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .refresh-btn:hover { background: var(--accent); color: #fff; }
        .refresh-btn.loading .refresh-icon { animation: spin 0.8s linear infinite; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .date-display {
            color: var(--text-dim);
            font-size: 13px;
            margin-left: auto;
        }

        /* News feed */
        .feed { display: flex; flex-direction: column; gap: 12px; }

        .news-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            transition: border-color 0.15s;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .news-card:hover { border-color: var(--accent); }

        .news-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .company-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background: var(--surface2);
            border: 1px solid var(--border);
        }

        .company-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .news-type {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(138, 143, 168, 0.15);
            color: var(--text-dim);
        }

        .news-date {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: auto;
        }

        .news-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .news-source {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            color: var(--accent);
            text-decoration: none;
        }

        .news-source:hover { text-decoration: underline; }

        /* Relevance feedback buttons */
        .feedback-buttons {
            display: flex;
            gap: 6px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .feedback-btn {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.15s;
            padding: 0;
            line-height: 1;
        }

        .feedback-btn:hover { background: var(--surface2); }

        .feedback-btn.relevant {
            color: var(--green);
            border-color: var(--green);
        }

        .feedback-btn.relevant.active {
            background: rgba(52, 211, 153, 0.2);
            border-color: var(--green);
        }

        .feedback-btn.irrelevant {
            color: var(--red);
            border-color: var(--red);
        }

        .feedback-btn.irrelevant.active {
            background: rgba(248, 113, 113, 0.2);
            border-color: var(--red);
        }

        .news-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        /* File upload */
        .upload-section {
            margin-bottom: 24px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: all 0.2s;
            position: relative;
        }

        .upload-section.dragover {
            border-color: var(--accent);
            background: rgba(108, 124, 255, 0.05);
        }

        .upload-section p {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .upload-section .upload-hint {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 8px;
            opacity: 0.7;
        }

        .upload-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .upload-btn:hover { background: var(--accent); color: #fff; }

        .upload-file-input { display: none; }

        .upload-progress {
            margin-top: 16px;
            display: none;
        }

        .upload-progress.visible { display: block; }

        .upload-progress-bar {
            height: 4px;
            background: var(--surface2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .upload-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }

        .upload-status {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* Import preview modal */
        .import-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .import-overlay.visible { display: flex; }

        .import-modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .import-modal h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .import-modal .import-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .import-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: border-color 0.15s;
        }

        .import-item:hover { border-color: var(--accent); }

        .import-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .import-item-info { flex: 1; min-width: 0; }

        .import-item-name {
            font-weight: 500;
            font-size: 14px;
        }

        .import-item-meta {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .import-item-edit {
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 12px;
            outline: none;
            width: 160px;
            flex-shrink: 0;
        }

        .import-item-edit:focus { border-color: var(--accent); }

        .import-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .import-cancel-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
        }

        .import-confirm-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .import-confirm-btn:hover { background: var(--accent-hover); }
        .import-cancel-btn:hover { color: var(--text); border-color: var(--text-dim); }

        .import-select-all {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            font-size: 13px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .import-select-all input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        /* Empty & error states */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state p { font-size: 14px; margin-top: 8px; }

        .error-banner {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--red);
            display: none;
        }

        .error-banner.visible { display: block; }

        .status-bar {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 16px;
            display: none;
        }

        .status-bar.visible { display: block; }

        /* Portfolio management */
        .portfolio-section { display: none; }
        .portfolio-section.active { display: block; }
        .feed-section { display: none; }
        .feed-section.active { display: block; }

        .add-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 8px;
            margin-bottom: 24px;
        }

        .form-input {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--text-dim); }

        .add-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .add-btn:hover { background: var(--accent-hover); }

        .company-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .company-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
        }

        .company-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .company-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .company-name { font-weight: 500; font-size: 15px; }

        .company-meta {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .company-website {
            font-size: 12px;
            color: var(--accent);
            text-decoration: none;
            margin-top: 1px;
            display: inline-block;
        }

        .company-website:hover { text-decoration: underline; }

        .remove-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--red);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .remove-btn:hover { background: rgba(248, 113, 113, 0.1); border-color: var(--red); }

        .company-count {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        /* Loading */
        .loading-skeleton {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-line {
            height: 12px;
            background: var(--surface2);
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .skeleton-line:last-child { margin-bottom: 0; width: 60%; }
        .skeleton-line.short { width: 40%; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .controls { flex-direction: column; align-items: stretch; }
            .date-display { margin-left: 0; }
            header { flex-direction: column; align-items: flex-start; }
            .add-form { grid-template-columns: 1fr; }
            .date-range { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>&#9679;</span> Portfolio Dealflow</h1>
            <div class="tabs">
                <button class="tab active" data-tab="feed">Nieuwsfeed</button>
                <button class="tab" data-tab="portfolio">Portfolio</button>
            </div>
        </header>

        <!-- Feed Section -->
        <div class="feed-section active" id="feed-section">
            <div class="controls">
                <div class="period-selector">
                    <button class="period-btn active" data-period="day">Dag</button>
                    <button class="period-btn" data-period="week">Week</button>
                    <button class="period-btn" data-period="month">Maand</button>
                    <button class="period-btn" data-period="quarter">Kwartaal</button>
                    <button class="period-btn" data-period="custom">Aangepast</button>
                </div>
                <div class="quarter-selector" id="quarter-selector" style="display:none">
                    <select class="form-input" id="quarter-select" style="padding:6px 10px;font-size:13px;border-radius:6px;">
                    </select>
                </div>
                <div class="date-range" id="date-range" style="display:none">
                    <label>Van</label>
                    <input type="date" class="date-input" id="date-from">
                    <label>Tot</label>
                    <input type="date" class="date-input" id="date-to">
                </div>
                <button class="refresh-btn" id="refresh-btn">
                    <svg class="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Vernieuwen
                </button>
                <span class="date-display" id="date-display"></span>
            </div>
            <div class="error-banner" id="error-banner"></div>
            <div class="status-bar" id="status-bar"></div>
            <div class="feed" id="news-feed"></div>
        </div>

        <!-- Portfolio Section -->
        <div class="portfolio-section" id="portfolio-section">
            <div class="upload-section" id="upload-section">
                <p><strong>Importeer bedrijven uit een bestand</strong></p>
                <p>Upload een PDF of Excel (.xlsx, .xls, .csv) met je portfolio of investeringen</p>
                <input type="file" class="upload-file-input" id="file-input" accept=".pdf,.xlsx,.xls,.csv">
                <button class="upload-btn" id="upload-btn">Bestand kiezen</button>
                <div class="upload-hint">Sleep een bestand hierheen of klik om te kiezen</div>
                <div class="upload-progress" id="upload-progress">
                    <div class="upload-progress-bar"><div class="upload-progress-fill" id="upload-progress-fill"></div></div>
                    <div class="upload-status" id="upload-status">Bestand verwerken...</div>
                </div>
            </div>
            <div class="add-form">
                <input type="text" class="form-input" id="company-input" placeholder="Bedrijfsnaam *">
                <input type="url" class="form-input" id="website-input" placeholder="Website (bijv. stripe.com)">
                <input type="text" class="form-input" id="sector-input" placeholder="Sector (optioneel)">
                <button class="add-btn" id="add-btn">Toevoegen</button>
            </div>
            <div class="company-count" id="company-count"></div>
            <div class="company-list" id="company-list"></div>
        </div>
    </div>

    <!-- Import preview modal -->
    <div class="import-overlay" id="import-overlay">
        <div class="import-modal">
            <h2>Gevonden bedrijven</h2>
            <div class="import-subtitle" id="import-subtitle">Selecteer welke bedrijven je wilt toevoegen aan je portfolio</div>
            <label class="import-select-all">
                <input type="checkbox" id="import-select-all" checked>
                Alles selecteren
            </label>
            <div id="import-list"></div>
            <div class="import-actions">
                <button class="import-cancel-btn" id="import-cancel">Annuleren</button>
                <button class="import-confirm-btn" id="import-confirm">Toevoegen aan portfolio</button>
            </div>
        </div>
    </div>

    <script>
        // --- Config ---
        const STORAGE_KEY = 'portfolio-dealflow';
        const COLORS = ['#6c7cff','#34d399','#f87171','#fbbf24','#a855f7','#ec4899','#06b6d4','#f97316','#84cc16','#64748b'];

        // Investor-relevant keywords for search queries
        const INVESTOR_KEYWORDS = [
            'funding', 'investment', 'valuation', 'IPO', 'acquisition',
            'revenue', 'partnership', 'series', 'raise', 'merger',
            'growth', 'expansion', 'financiering', 'overname', 'waardering'
        ];

        // --- Relevance scoring for investment case (5-year horizon) ---
        // HIGH impact: events that materially affect company valuation or trajectory
        const HIGH_RELEVANCE = [
            // Funding & valuation
            /\b(series [a-f]|funding|fundrais|raised?|financiering|kapitaal)\b/i,
            /\b(valuation|waardering|waarde)\b/i,
            /\b(IPO|beursgang|public offering|beurs)\b/i,
            /\b(SPAC|direct listing)\b/i,
            // M&A
            /\b(acqui|overname|overgenomen|merger|fusie|bought|koopt|koop)\b/i,
            /\b(take.?over|bod gedaan|bid)\b/i,
            // Revenue & financials
            /\b(revenue|omzet|omzetgroei|winst|profit|loss|verlies|EBITDA|ARR|MRR)\b/i,
            /\b(kwartaalcijfers|quarterly|earnings|results|jaarverslag|annual report)\b/i,
            /\b(breakeven|break.even|winstgevend|profitable|profitability)\b/i,
            // Strategic
            /\b(pivot|strateg|restructur|herstructurer|reorganis)\b/i,
            /\b(bankrupt|failliet|insolvency|default|liquidat)\b/i,
            // Clinical / regulatory (biotech/pharma)
            /\b(FDA|EMA|approv|goedgekeurd|clinical trial|fase [1-3]|phase [1-3])\b/i,
            /\b(trial results?|testresultat|endpoint|efficacy)\b/i,
            /\b(patent|octrooi|IP|intellectual property)\b/i,
            // Leadership
            /\b(CEO|CFO|CTO|COO|founder|oprichter|board|bestuur)\b/i,
            /\b(apoint|benoem|stepped down|afgetreden|resign|vertrek)\b/i,
            // Market position
            /\b(market share|marktaandeel|monopol|dominant|marktleider)\b/i,
            /\b(unicorn|decacorn)\b/i,
        ];

        // MEDIUM impact: notable but not directly value-changing
        const MEDIUM_RELEVANCE = [
            /\b(partnership|samenwerking|partner|alliantie|alliance)\b/i,
            /\b(contract|deal|overeenkomst|agreement)\b/i,
            /\b(launch|lanceer|lanceert|release|uitgebracht)\b/i,
            /\b(expansion|expansie|uitbreid|groei|growth|scaling)\b/i,
            /\b(hire|hiring|aannemen|recruit|talent|team)\b/i,
            /\b(regulation|regulering|wetgeving|compliance|toezicht)\b/i,
            /\b(competitor|concurrent|concurrentie|competit)\b/i,
            /\b(investment|investering|investor|investeerder)\b/i,
            /\b(technology|technologie|platform|infrastructure)\b/i,
            /\b(customer|klant|gebruiker|user)s?\s*(growth|groei|base|bestand)/i,
        ];

        // LOW relevance: noise for an investor
        const LOW_RELEVANCE = [
            /\b(shirt|jersey|tenue|kit|merchandise|merch)\b/i,
            /\b(fan|supporter|wedstrijd|match|game|score|goal|doelpunt)\b/i,
            /\b(recipe|recept|lifestyle|fashion|mode|outfit|look)\b/i,
            /\b(celebrity|beroemdheid|influencer|instagram|tiktok|viral)\b/i,
            /\b(coupon|korting|discount|aanbieding|sale|actie|deal of the)\b/i,
            /\b(review|recensie|unboxing|hands.on|how.to|tutorial)\b/i,
            /\b(weather|weer|horoscoop|horoscope)\b/i,
            /\b(gossip|roddel|scandal|schandaal)\b/i,
            /\b(playlist|concert|festival|album|song|nummer)\b/i,
        ];

        function scoreRelevance(title, source) {
            const text = (title + ' ' + source).toLowerCase();
            let score = 0;

            for (const pattern of HIGH_RELEVANCE) {
                if (pattern.test(text)) score += 10;
            }
            for (const pattern of MEDIUM_RELEVANCE) {
                if (pattern.test(text)) score += 4;
            }
            for (const pattern of LOW_RELEVANCE) {
                if (pattern.test(text)) score -= 15;
            }

            // Boost if from known business/financial sources
            const businessSources = /\b(bloomberg|reuters|financial times|ft\.com|wsj|wall street|techcrunch|crunchbase|pitchbook|venturebeat|forbes|fortune|cnbc|fd|financieele dagblad|rtl z|bnr)\b/i;
            if (businessSources.test(source) || businessSources.test(text)) {
                score += 5;
            }

            return score;
        }

        // Minimum relevance threshold to show an article (lowered to show more results)
        const RELEVANCE_THRESHOLD = 0;

        // Multiple CORS proxies for fallback
        const CORS_PROXIES = [
            url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
        ];

        const FEEDBACK_KEY = 'portfolio-dealflow-feedback';

        let state = loadState();
        let feedback = loadFeedback();  // { [articleKey]: 'relevant' | 'irrelevant' }
        let newsItems = [];
        let isLoading = false;

        function loadFeedback() {
            try {
                const saved = localStorage.getItem(FEEDBACK_KEY);
                return saved ? JSON.parse(saved) : {};
            } catch(e) { return {}; }
        }

        function saveFeedback() {
            localStorage.setItem(FEEDBACK_KEY, JSON.stringify(feedback));
        }

        function articleKey(item) {
            return (item.company + '|' + item.title).substring(0, 200);
        }

        // Learn from feedback: boost/penalize keywords from marked articles
        function getFeedbackScoreAdjustment(title, company) {
            let adjustment = 0;
            const titleWords = title.toLowerCase().split(/\s+/).filter(w => w.length > 3);

            for (const [key, value] of Object.entries(feedback)) {
                const [fbCompany, fbTitle] = key.split('|');
                if (fbCompany !== company) continue;

                const fbWords = (fbTitle || '').toLowerCase().split(/\s+/).filter(w => w.length > 3);
                // Count overlapping words
                const overlap = titleWords.filter(w => fbWords.includes(w)).length;
                if (overlap >= 2) {
                    adjustment += value === 'relevant' ? 3 : -5;
                }
            }
            return adjustment;
        }

        // --- State management ---
        function defaultState() {
            return {
                companies: [
                    { name: 'Stripe', website: 'https://stripe.com', sector: 'Fintech', color: COLORS[0] },
                    { name: 'SpaceX', website: 'https://spacex.com', sector: 'Aerospace', color: COLORS[1] },
                    { name: 'Databricks', website: 'https://databricks.com', sector: 'AI/Data', color: COLORS[2] },
                ],
                period: 'day',
                quarter: '',
                dateFrom: '',
                dateTo: ''
            };
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.companies && parsed.companies.length >= 0) return parsed;
                }
            } catch(e) {}
            return defaultState();
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        // --- CORS proxy with fallback ---
        async function fetchWithProxy(url) {
            for (let i = 0; i < CORS_PROXIES.length; i++) {
                try {
                    const proxyUrl = CORS_PROXIES[i](url);
                    const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    return await resp.text();
                } catch(e) {
                    console.warn(`Proxy ${i + 1} mislukt:`, e.message);
                    if (i === CORS_PROXIES.length - 1) throw e;
                }
            }
        }

        // --- Google News RSS ---
        function getQuarterDates(quarterStr) {
            // Format: "2026-Q1" -> { from: Jan 1, to: Mar 31 }
            const [year, q] = quarterStr.split('-Q');
            const qNum = parseInt(q);
            const y = parseInt(year);
            const startMonth = (qNum - 1) * 3;
            const from = new Date(y, startMonth, 1);
            const to = new Date(y, startMonth + 3, 0, 23, 59, 59); // last day of quarter
            return { from, to };
        }

        function populateQuarterSelect() {
            const select = document.getElementById('quarter-select');
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentQ = Math.ceil((now.getMonth() + 1) / 3);
            const options = [];

            // Show quarters from current back to 2 years ago
            for (let y = currentYear; y >= currentYear - 2; y--) {
                const maxQ = (y === currentYear) ? currentQ : 4;
                for (let q = maxQ; q >= 1; q--) {
                    const val = `${y}-Q${q}`;
                    const label = `Q${q} ${y}`;
                    options.push(`<option value="${val}" ${val === state.quarter ? 'selected' : ''}>${label}</option>`);
                }
            }

            select.innerHTML = options.join('');
        }

        function getDateRangeParams() {
            const period = state.period;
            const now = new Date();
            let from, to;

            if (period === 'quarter' && state.quarter) {
                return getQuarterDates(state.quarter);
            } else if (period === 'custom') {
                from = state.dateFrom ? new Date(state.dateFrom + 'T00:00:00') : new Date(now - 86400000);
                to = state.dateTo ? new Date(state.dateTo + 'T23:59:59') : now;
            } else if (period === 'day') {
                from = new Date(now - 86400000);
                to = now;
            } else if (period === 'week') {
                from = new Date(now - 7 * 86400000);
                to = now;
            } else {
                from = new Date(now - 30 * 86400000);
                to = now;
            }

            return { from, to };
        }

        function getGoogleNewsDateParam() {
            const period = state.period;
            if (period === 'quarter' && state.quarter) {
                const { from, to } = getQuarterDates(state.quarter);
                const fStr = from.toISOString().split('T')[0];
                const tStr = to.toISOString().split('T')[0];
                return `after:${fStr} before:${tStr}`;
            }
            if (period === 'custom') {
                const from = state.dateFrom || '';
                const to = state.dateTo || '';
                if (from && to) {
                    return `after:${from} before:${to}`;
                } else if (from) {
                    return `after:${from}`;
                } else if (to) {
                    return `before:${to}`;
                }
                return 'when:7d';
            }
            if (period === 'day') return 'when:1d';
            if (period === 'week') return 'when:7d';
            return 'when:30d';
        }

        async function fetchNewsForCompany(company) {
            const dateParam = getGoogleNewsDateParam();
            const items = [];
            const seenTitles = new Set();

            function addItems(newItems) {
                for (const item of newItems) {
                    if (!seenTitles.has(item.title)) {
                        seenTitles.add(item.title);
                        items.push(item);
                    }
                }
            }

            // 1. Always fetch broad company results first (catches more news)
            try {
                const broadQuery = `"${company.name}" ${dateParam}`;
                const broadUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(broadQuery)}&hl=nl&gl=NL&ceid=NL:nl`;
                const broadText = await fetchWithProxy(broadUrl);
                addItems(parseRSS(broadText, company));
            } catch(e) {
                console.warn(`Breed nieuws ophalen mislukt voor ${company.name}:`, e);
            }

            // 2. Also fetch investor-focused results
            try {
                const investorTerms = INVESTOR_KEYWORDS.slice(0, 6).join(' OR ');
                const query = `"${company.name}" (${investorTerms}) ${dateParam}`;
                const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=nl&gl=NL&ceid=NL:nl`;
                const text = await fetchWithProxy(rssUrl);
                addItems(parseRSS(text, company));
            } catch(e) {
                console.warn(`Investor nieuws ophalen mislukt voor ${company.name}:`, e);
            }

            return items;
        }

        function parseRSS(xmlText, company) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlText, 'text/xml');

            // Check for parse errors
            if (doc.querySelector('parsererror')) {
                console.warn('RSS parse error voor', company.name);
                return [];
            }

            const items = doc.querySelectorAll('item');
            const results = [];

            items.forEach(item => {
                const title = item.querySelector('title')?.textContent || '';
                const pubDate = item.querySelector('pubDate')?.textContent || '';
                const source = item.querySelector('source')?.textContent || '';

                // Google News RSS: <link> text is between <link> and next tag
                // querySelector('link') returns empty in some parsers, use regex fallback
                let link = '';
                const linkEl = item.querySelector('link');
                if (linkEl && linkEl.textContent) {
                    link = linkEl.textContent.trim();
                }
                if (!link) {
                    const itemXml = new XMLSerializer().serializeToString(item);
                    const linkMatch = itemXml.match(/<link[^>]*>(.*?)<\/link>/s) ||
                                     itemXml.match(/<link[^>]*\/>\s*(https?:\/\/[^\s<]+)/);
                    if (linkMatch) link = linkMatch[1].trim();
                }

                // Clean title: Google News appends " - Source" at the end
                const cleanTitle = title.replace(/\s*-\s*[^-]+$/, '');

                results.push({
                    company: company.name,
                    color: company.color,
                    website: company.website || '',
                    title: cleanTitle,
                    link,
                    source,
                    date: pubDate ? new Date(pubDate) : new Date(),
                    dateStr: pubDate ? formatDateFromDate(new Date(pubDate)) : ''
                });
            });

            return results;
        }

        function filterByDateRange(items) {
            const { from, to } = getDateRangeParams();
            return items.filter(item => item.date >= from && item.date <= to);
        }

        async function fetchAllNews() {
            if (state.companies.length === 0) {
                newsItems = [];
                return;
            }

            const errorBanner = document.getElementById('error-banner');
            const statusBar = document.getElementById('status-bar');
            let failedCompanies = [];

            statusBar.textContent = `Nieuws ophalen voor ${state.companies.length} bedrijven...`;
            statusBar.classList.add('visible');

            const promises = state.companies.map(async c => {
                try {
                    return await fetchNewsForCompany(c);
                } catch(e) {
                    failedCompanies.push(c.name);
                    return [];
                }
            });

            const results = await Promise.all(promises);
            let all = results.flat();

            // Filter by date range
            all = filterByDateRange(all);

            // Score each article on investment relevance + user feedback
            all = all.map(item => {
                const baseScore = scoreRelevance(item.title, item.source);
                const feedbackAdj = getFeedbackScoreAdjustment(item.title, item.company);
                const key = articleKey(item);
                // If user explicitly marked irrelevant, hide it; if relevant, always show
                const userVerdict = feedback[key];
                return {
                    ...item,
                    relevance: baseScore + feedbackAdj,
                    userFeedback: userVerdict || null
                };
            });

            // Filter: hide explicitly irrelevant articles, keep explicitly relevant
            // For unmarked: use threshold but lower it so more articles appear
            all = all.filter(item => {
                if (item.userFeedback === 'irrelevant') return false;
                if (item.userFeedback === 'relevant') return true;
                return item.relevance >= RELEVANCE_THRESHOLD;
            });

            // Sort by relevance first, then by date
            all.sort((a, b) => {
                if (b.relevance !== a.relevance) return b.relevance - a.relevance;
                return b.date - a.date;
            });

            // Show all relevant articles (no artificial cap)
            newsItems = all;

            // Show status
            statusBar.textContent = `${newsItems.length} artikel${newsItems.length !== 1 ? 'en' : ''} gevonden`;
            statusBar.classList.add('visible');

            if (failedCompanies.length > 0) {
                errorBanner.textContent = `Kon geen nieuws ophalen voor: ${failedCompanies.join(', ')}. Controleer je internetverbinding of probeer het later opnieuw.`;
                errorBanner.classList.add('visible');
            } else {
                errorBanner.classList.remove('visible');
            }
        }

        // --- Rendering ---
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDateFromDate(d) {
            return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

        function renderDateDisplay() {
            const el = document.getElementById('date-display');
            const fullOpts = { day: 'numeric', month: 'long', year: 'numeric' };
            const { from, to } = getDateRangeParams();

            if (state.period === 'day') {
                el.textContent = new Date().toLocaleDateString('nl-NL', fullOpts);
            } else {
                el.textContent = from.toLocaleDateString('nl-NL', fullOpts) +
                    ' - ' + to.toLocaleDateString('nl-NL', fullOpts);
            }
        }

        function showLoading() {
            document.getElementById('news-feed').innerHTML = Array(3).fill(`
                <div class="loading-skeleton">
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                </div>
            `).join('');
        }

        function renderFeed() {
            const feed = document.getElementById('news-feed');

            if (newsItems.length === 0) {
                feed.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p><strong>Geen nieuws gevonden</strong></p>
                        <p>${state.companies.length === 0
                            ? 'Voeg eerst bedrijven toe aan je portfolio.'
                            : 'Geen relevant investeerder-nieuws voor deze periode. Probeer een andere tijdspanne of klik op Vernieuwen.'}</p>
                    </div>`;
                return;
            }

            feed.innerHTML = newsItems.map((item, idx) => {
                const key = articleKey(item);
                const fb = feedback[key] || null;
                const relevanceLabel = item.relevance >= 10 ? 'Hoog' : item.relevance >= 4 ? 'Medium' : 'Laag';
                const relevanceAlpha = Math.min(Math.max(item.relevance, 0) / 30, 1) * 0.25;

                return `
                <div class="news-card" data-index="${idx}">
                    <div class="news-card-header">
                        <span class="company-badge">
                            <span class="company-dot" style="background:${escapeHtml(item.color)}"></span>
                            ${escapeHtml(item.company)}
                        </span>
                        ${item.source ? `<span class="news-type">${escapeHtml(item.source)}</span>` : ''}
                        <span class="news-type" style="background:rgba(52,211,153,${relevanceAlpha});color:var(--green)">${relevanceLabel}</span>
                        <span class="news-date">${escapeHtml(item.dateStr)}</span>
                    </div>
                    <a href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;color:inherit">
                        <div class="news-title">${escapeHtml(item.title)}</div>
                    </a>
                    <div class="news-card-footer">
                        <a class="news-source" href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">Lees artikel &#8594;</a>
                        ${fb === 'relevant'
                            ? `<span style="font-size:12px;color:var(--green);">&#10003; Goedgekeurd</span>`
                            : `<div class="feedback-buttons">
                                <button class="feedback-btn irrelevant" data-idx="${idx}" data-action="irrelevant" title="Niet relevant">&#10007;</button>
                                <button class="feedback-btn relevant" data-idx="${idx}" data-action="relevant" title="Wel relevant">&#10003;</button>
                            </div>`
                        }
                    </div>
                </div>`;
            }).join('');
        }

        function renderCompanyList() {
            const list = document.getElementById('company-list');
            const count = document.getElementById('company-count');
            count.textContent = `${state.companies.length} bedrijven in portfolio`;

            if (state.companies.length === 0) {
                list.innerHTML = `<div class="empty-state"><p>Geen bedrijven in je portfolio. Voeg er een toe hierboven.</p></div>`;
                return;
            }

            list.innerHTML = state.companies.map((c, i) => {
                const displayUrl = c.website ? c.website.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '') : '';
                const fullUrl = c.website ? (c.website.startsWith('http') ? c.website : 'https://' + c.website) : '';

                return `
                <div class="company-item">
                    <div class="company-info">
                        <span class="company-color" style="background:${c.color}"></span>
                        <div>
                            <div class="company-name">${escapeHtml(c.name)}</div>
                            ${c.sector ? `<div class="company-meta">${escapeHtml(c.sector)}</div>` : ''}
                            ${displayUrl ? `<a class="company-website" href="${escapeHtml(fullUrl)}" target="_blank" rel="noopener">${escapeHtml(displayUrl)}</a>` : ''}
                        </div>
                    </div>
                    <button class="remove-btn" data-index="${i}">Verwijderen</button>
                </div>`;
            }).join('');
        }

        // --- Refresh ---
        async function refreshNews() {
            if (isLoading) return;
            isLoading = true;
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('loading');
            document.getElementById('error-banner').classList.remove('visible');
            showLoading();

            await fetchAllNews();

            btn.classList.remove('loading');
            isLoading = false;
            renderFeed();
        }

        // --- Event handlers ---
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                document.getElementById('feed-section').classList.toggle('active', target === 'feed');
                document.getElementById('portfolio-section').classList.toggle('active', target === 'portfolio');
            });
        });

        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.period = btn.dataset.period;

                const dateRange = document.getElementById('date-range');
                const quarterSelector = document.getElementById('quarter-selector');

                if (state.period === 'custom') {
                    dateRange.style.display = 'flex';
                    quarterSelector.style.display = 'none';
                    if (!state.dateFrom) {
                        const d = new Date();
                        d.setDate(d.getDate() - 7);
                        state.dateFrom = d.toISOString().split('T')[0];
                        document.getElementById('date-from').value = state.dateFrom;
                    }
                    if (!state.dateTo) {
                        state.dateTo = new Date().toISOString().split('T')[0];
                        document.getElementById('date-to').value = state.dateTo;
                    }
                } else if (state.period === 'quarter') {
                    dateRange.style.display = 'none';
                    quarterSelector.style.display = 'flex';
                    populateQuarterSelect();
                    if (!state.quarter) {
                        const now = new Date();
                        state.quarter = `${now.getFullYear()}-Q${Math.ceil((now.getMonth() + 1) / 3)}`;
                    }
                    document.getElementById('quarter-select').value = state.quarter;
                } else {
                    dateRange.style.display = 'none';
                    quarterSelector.style.display = 'none';
                }

                saveState();
                renderDateDisplay();
                refreshNews();
            });
        });

        document.getElementById('quarter-select').addEventListener('change', (e) => {
            state.quarter = e.target.value;
            saveState();
            renderDateDisplay();
            refreshNews();
        });

        document.getElementById('date-from').addEventListener('change', (e) => {
            state.dateFrom = e.target.value;
            saveState();
            renderDateDisplay();
        });

        document.getElementById('date-to').addEventListener('change', (e) => {
            state.dateTo = e.target.value;
            saveState();
            renderDateDisplay();
        });

        document.getElementById('refresh-btn').addEventListener('click', refreshNews);

        document.getElementById('add-btn').addEventListener('click', addCompany);
        document.getElementById('company-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addCompany();
        });

        function addCompany() {
            const nameInput = document.getElementById('company-input');
            const websiteInput = document.getElementById('website-input');
            const sectorInput = document.getElementById('sector-input');
            const name = nameInput.value.trim();
            if (!name) return;

            const exists = state.companies.some(c => c.name.toLowerCase() === name.toLowerCase());
            if (exists) { nameInput.value = ''; return; }

            let website = websiteInput.value.trim();
            if (website && !website.startsWith('http')) {
                website = 'https://' + website;
            }

            state.companies.push({
                name,
                website,
                sector: sectorInput.value.trim() || '',
                color: COLORS[state.companies.length % COLORS.length]
            });
            saveState();
            nameInput.value = '';
            websiteInput.value = '';
            sectorInput.value = '';
            renderCompanyList();
        }

        document.getElementById('company-list').addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-btn')) {
                const index = parseInt(e.target.dataset.index);
                state.companies.splice(index, 1);
                saveState();
                renderCompanyList();
            }
        });

        // Feedback buttons on news cards
        document.getElementById('news-feed').addEventListener('click', (e) => {
            const btn = e.target.closest('.feedback-btn');
            if (!btn) return;

            e.preventDefault();
            e.stopPropagation();

            const idx = parseInt(btn.dataset.idx);
            const action = btn.dataset.action;
            const item = newsItems[idx];
            if (!item) return;

            const key = articleKey(item);
            feedback[key] = action;
            saveFeedback();

            if (action === 'irrelevant') {
                // Irrelevant: animate out and remove
                const card = btn.closest('.news-card');
                card.style.transition = 'opacity 0.3s, transform 0.3s';
                card.style.opacity = '0';
                card.style.transform = 'translateX(20px)';
                setTimeout(() => {
                    newsItems.splice(idx, 1);
                    renderFeed();
                }, 300);
            } else {
                // Relevant: approved - re-render to replace buttons with "Goedgekeurd"
                renderFeed();
            }
        });

        // --- File Import ---
        let pendingImports = [];

        // Set up pdf.js worker
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        // Upload section: drag and drop
        const uploadSection = document.getElementById('upload-section');
        const fileInput = document.getElementById('file-input');

        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileUpload(e.dataTransfer.files[0]);
            }
        });

        document.getElementById('upload-btn').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                handleFileUpload(fileInput.files[0]);
                fileInput.value = '';
            }
        });

        function showUploadProgress(text, pct) {
            const progress = document.getElementById('upload-progress');
            const fill = document.getElementById('upload-progress-fill');
            const status = document.getElementById('upload-status');
            progress.classList.add('visible');
            fill.style.width = pct + '%';
            status.textContent = text;
        }

        function hideUploadProgress() {
            document.getElementById('upload-progress').classList.remove('visible');
        }

        async function handleFileUpload(file) {
            const ext = file.name.split('.').pop().toLowerCase();

            showUploadProgress(`Bestand "${file.name}" verwerken...`, 20);

            try {
                let extracted = [];

                if (ext === 'pdf') {
                    extracted = await parsePDF(file);
                } else if (ext === 'xlsx' || ext === 'xls') {
                    extracted = await parseExcel(file);
                } else if (ext === 'csv') {
                    extracted = await parseCSV(file);
                } else {
                    showUploadProgress('Ongeldig bestandstype. Gebruik PDF, Excel of CSV.', 0);
                    setTimeout(hideUploadProgress, 3000);
                    return;
                }

                showUploadProgress(`${extracted.length} bedrijven gevonden, voorvertoning laden...`, 80);

                if (extracted.length === 0) {
                    showUploadProgress('Geen bedrijven gevonden in dit bestand. Controleer of het bedrijfsnamen bevat.', 0);
                    setTimeout(hideUploadProgress, 4000);
                    return;
                }

                // Deduplicate against existing portfolio
                const existingNames = new Set(state.companies.map(c => c.name.toLowerCase()));
                extracted = extracted.filter(e => !existingNames.has(e.name.toLowerCase()));

                if (extracted.length === 0) {
                    showUploadProgress('Alle gevonden bedrijven staan al in je portfolio.', 100);
                    setTimeout(hideUploadProgress, 3000);
                    return;
                }

                showUploadProgress(`${extracted.length} nieuwe bedrijven gevonden!`, 100);
                setTimeout(hideUploadProgress, 1000);

                pendingImports = extracted;
                showImportModal(extracted);

            } catch(e) {
                console.error('Import error:', e);
                showUploadProgress('Fout bij verwerken: ' + e.message, 0);
                setTimeout(hideUploadProgress, 4000);
            }
        }

        // --- PDF parsing ---
        async function parsePDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = '';

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const pageText = content.items.map(item => item.str).join(' ');
                fullText += pageText + '\n';
            }

            return extractCompaniesFromText(fullText);
        }

        // --- Excel parsing ---
        async function parseExcel(file) {
            const arrayBuffer = await file.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, { type: 'array' });

            const allCompanies = [];

            for (const sheetName of workbook.SheetNames) {
                const sheet = workbook.Sheets[sheetName];
                const data = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                if (data.length < 1) continue;

                const companies = extractCompaniesFromTable(data);
                allCompanies.push(...companies);
            }

            // Deduplicate
            const seen = new Set();
            return allCompanies.filter(c => {
                const key = c.name.toLowerCase();
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        // --- CSV parsing ---
        async function parseCSV(file) {
            const text = await file.text();
            const rows = text.split('\n').map(row => {
                // Simple CSV parse (handles quoted fields)
                const result = [];
                let current = '';
                let inQuotes = false;
                for (const char of row) {
                    if (char === '"') { inQuotes = !inQuotes; }
                    else if ((char === ',' || char === ';') && !inQuotes) { result.push(current.trim()); current = ''; }
                    else { current += char; }
                }
                result.push(current.trim());
                return result;
            });
            return extractCompaniesFromTable(rows);
        }

        // --- Smart extraction from tabular data ---
        function extractCompaniesFromTable(rows) {
            if (rows.length < 2) return [];

            const header = rows[0].map(h => String(h || '').toLowerCase().trim());

            // Find relevant columns by matching header names
            const nameAliases = ['company', 'bedrijf', 'naam', 'name', 'bedrijfsnaam', 'portfolio', 'asset', 'investment', 'investering', 'onderneming', 'target', 'entity'];
            const websiteAliases = ['website', 'url', 'site', 'web', 'link', 'homepage', 'domein', 'domain'];
            const sectorAliases = ['sector', 'industry', 'branche', 'categorie', 'category', 'segment', 'type', 'industrie'];

            let nameCol = -1, websiteCol = -1, sectorCol = -1;

            for (let i = 0; i < header.length; i++) {
                const h = header[i];
                if (nameCol === -1 && nameAliases.some(a => h.includes(a))) nameCol = i;
                if (websiteCol === -1 && websiteAliases.some(a => h.includes(a))) websiteCol = i;
                if (sectorCol === -1 && sectorAliases.some(a => h.includes(a))) sectorCol = i;
            }

            // If no name column found, try first text column
            if (nameCol === -1) {
                for (let i = 0; i < header.length; i++) {
                    if (header[i] && typeof rows[1]?.[i] === 'string' && rows[1][i].trim().length > 0) {
                        nameCol = i;
                        break;
                    }
                }
            }

            if (nameCol === -1) return [];

            const companies = [];

            for (let r = 1; r < rows.length; r++) {
                const row = rows[r];
                if (!row || !row[nameCol]) continue;

                const name = String(row[nameCol]).trim();
                if (!name || name.length < 2 || name.length > 80) continue;
                // Skip rows that look like subtotals, headers, etc.
                if (/^(totaal|total|subtotal|som|gemiddeld|average|#|nr)/i.test(name)) continue;

                let website = websiteCol >= 0 ? String(row[websiteCol] || '').trim() : '';
                const sector = sectorCol >= 0 ? String(row[sectorCol] || '').trim() : '';

                // Try to find a URL in any cell of the row if no website column
                if (!website) {
                    for (const cell of row) {
                        const cellStr = String(cell || '');
                        const urlMatch = cellStr.match(/https?:\/\/[^\s,;]+|www\.[^\s,;]+|\b[\w-]+\.(com|nl|io|co|org|net|eu|de|be|app|tech|ai)\b/i);
                        if (urlMatch) {
                            website = urlMatch[0];
                            break;
                        }
                    }
                }

                if (website && !website.startsWith('http')) {
                    website = 'https://' + website.replace(/^www\./, '');
                }

                companies.push({ name, website, sector });
            }

            return companies;
        }

        // --- Smart extraction from unstructured text (PDF) ---
        // Focus: identify fund investments, portfolio companies, assets from fund documents
        function extractCompaniesFromText(text) {
            const companies = [];
            const seen = new Set();

            // Extract all URLs for later matching
            const urlMap = {};
            const urlRegex = /(https?:\/\/[^\s,;)]+|www\.[^\s,;)]+)/gi;
            let urlMatch;
            while ((urlMatch = urlRegex.exec(text)) !== null) {
                const url = urlMatch[1];
                const context = text.substring(Math.max(0, urlMatch.index - 150), urlMatch.index + url.length + 150);
                urlMap[url] = context;
            }

            // Summation/header lines that are NOT company names
            const skipLine = /^(total|totaal|subtotal|sub-total|investments|investering|amounts|bedragen|amounts in|fund performance|unrealized|realized|date|datum|country|naam|name|company|overview|overzicht|portfolio|assets?|section|hoofdstuk|pagina|page|\d{1,2}\s)/i;

            const lines = text.split(/[\n\r]+/).map(l => l.trim()).filter(l => l.length > 0);

            // STRATEGY 1: Detect lines that are a company name followed by a date (DD-MM-YYYY)
            // This is the most reliable pattern in fund performance tables
            // e.g. "Hypersolid 08-01-2021 NL 11,078,986 ..."
            // e.g. "Oppermann & Fuss 26-08-2022 GE ..."
            // e.g. "VMN media 10-02-2022 NL ..."
            const nameBeforeDateRegex = /^(.+?)\s+\d{2}[-\/]\d{2}[-\/]\d{4}/;

            // STRATEGY 2: Company name followed by a country code (2-letter)
            // e.g. "Hypersolid NL" or after date "... NL 11,078,986"
            const nameBeforeCountryRegex = /^(.+?)\s+(?:NL|BE|DE|GE|FR|UK|US|LU|IE|CH|AT|IT|ES|SE|DK|NO|FI)\b/;

            // STRATEGY 3: Company name followed by large numbers (investment amounts)
            // e.g. "Hypersolid 11,078,986 5,491,553"
            const nameBeforeAmountRegex = /^(.+?)\s+[\d,.]{4,}/;

            // STRATEGY 4: Company name followed by a percentage at end of line
            const nameBeforePctRegex = /^(.+?)\s+[-\d,.]+\s*%/;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.length < 2 || line.length > 200) continue;
                if (skipLine.test(line)) continue;

                let candidateName = null;

                // Try patterns in order of reliability
                let m = line.match(nameBeforeDateRegex);
                if (m) candidateName = m[1].trim();

                if (!candidateName) {
                    m = line.match(nameBeforeCountryRegex);
                    if (m) candidateName = m[1].trim();
                }

                if (!candidateName) {
                    m = line.match(nameBeforeAmountRegex);
                    if (m) candidateName = m[1].trim();
                }

                if (!candidateName) {
                    m = line.match(nameBeforePctRegex);
                    if (m) candidateName = m[1].trim();
                }

                if (!candidateName) continue;

                // Clean up: remove trailing dates/numbers that might have been captured
                candidateName = candidateName.replace(/\s+\d{2}[-\/]\d{2}[-\/]\d{4}.*$/, '').trim();
                candidateName = candidateName.replace(/\s+\d[\d,.]*$/, '').trim();

                // Validate the candidate
                if (candidateName.length < 2 || candidateName.length > 60) continue;
                if (candidateName.split(/\s+/).length > 6) continue;

                // Must start with a letter (handles umlauts like Höfer, accented chars)
                if (!/^[A-Za-zÀ-ÿ]/.test(candidateName)) continue;

                // Skip pure numbers, dates, single common words
                if (/^\d/.test(candidateName)) continue;
                if (/^(de|het|een|the|van|voor|met|door|over|naar|bij|uit|als|maar|dan|ook|nog|wel|niet|geen|dit|dat|die|total|totaal|sub|amounts?|date|datum|fund|investments?|unrealized|realized|gross|net|netto|bruto|per|cash|liquide|obligatie|rente|kosten|waarde|value|pagina|page)$/i.test(candidateName)) continue;

                const key = candidateName.toLowerCase();
                if (seen.has(key)) continue;
                seen.add(key);

                // Try to find associated URL in the document
                let website = '';
                for (const [url, context] of Object.entries(urlMap)) {
                    if (context.toLowerCase().includes(candidateName.toLowerCase())) {
                        website = url;
                        break;
                    }
                }
                if (website && !website.startsWith('http')) {
                    website = 'https://' + website;
                }

                companies.push({ name: candidateName, website, sector: '' });
            }

            return companies.slice(0, 100);
        }

        // --- Import modal ---
        function showImportModal(companies) {
            const overlay = document.getElementById('import-overlay');
            const list = document.getElementById('import-list');
            const subtitle = document.getElementById('import-subtitle');

            subtitle.textContent = `${companies.length} nieuwe bedrijven gevonden. Selecteer welke je wilt toevoegen.`;

            list.innerHTML = companies.map((c, i) => `
                <div class="import-item">
                    <input type="checkbox" checked data-idx="${i}" class="import-check">
                    <div class="import-item-info">
                        <div class="import-item-name">${escapeHtml(c.name)}</div>
                        <div class="import-item-meta">${c.sector ? escapeHtml(c.sector) : 'Geen sector'}${c.website ? ' &middot; ' + escapeHtml(c.website) : ''}</div>
                    </div>
                    <input type="text" class="import-item-edit" placeholder="Website (optioneel)" value="${escapeHtml(c.website || '')}" data-idx="${i}">
                </div>
            `).join('');

            overlay.classList.add('visible');
        }

        document.getElementById('import-select-all').addEventListener('change', (e) => {
            document.querySelectorAll('.import-check').forEach(cb => cb.checked = e.target.checked);
        });

        document.getElementById('import-cancel').addEventListener('click', () => {
            document.getElementById('import-overlay').classList.remove('visible');
            pendingImports = [];
        });

        document.getElementById('import-confirm').addEventListener('click', () => {
            const checkboxes = document.querySelectorAll('.import-check:checked');
            const websiteInputs = document.querySelectorAll('.import-item-edit');
            let added = 0;

            checkboxes.forEach(cb => {
                const idx = parseInt(cb.dataset.idx);
                const company = pendingImports[idx];
                if (!company) return;

                // Use edited website if user changed it
                const wsInput = document.querySelector(`.import-item-edit[data-idx="${idx}"]`);
                let website = wsInput ? wsInput.value.trim() : company.website;
                if (website && !website.startsWith('http')) {
                    website = 'https://' + website;
                }

                // Check for duplicates again
                const exists = state.companies.some(c => c.name.toLowerCase() === company.name.toLowerCase());
                if (exists) return;

                state.companies.push({
                    name: company.name,
                    website: website || '',
                    sector: company.sector || '',
                    color: COLORS[state.companies.length % COLORS.length]
                });
                added++;
            });

            saveState();
            renderCompanyList();

            document.getElementById('import-overlay').classList.remove('visible');
            pendingImports = [];

            if (added > 0) {
                showUploadProgress(`${added} bedrijf${added !== 1 ? 'en' : ''} toegevoegd aan je portfolio!`, 100);
                setTimeout(hideUploadProgress, 3000);
            }
        });

        // --- Init ---
        // Restore period state
        if (state.period === 'custom') {
            document.getElementById('date-range').style.display = 'flex';
            document.getElementById('date-from').value = state.dateFrom || '';
            document.getElementById('date-to').value = state.dateTo || '';
            document.querySelectorAll('.period-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.period === 'custom');
            });
        } else if (state.period === 'quarter') {
            document.getElementById('quarter-selector').style.display = 'flex';
            populateQuarterSelect();
            if (!state.quarter) {
                const now = new Date();
                state.quarter = `${now.getFullYear()}-Q${Math.ceil((now.getMonth() + 1) / 3)}`;
            }
            document.getElementById('quarter-select').value = state.quarter;
            document.querySelectorAll('.period-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.period === 'quarter');
            });
        }

        renderDateDisplay();
        renderCompanyList();
        refreshNews();
    </script>
</body>
